services:
  backend:
    build: .
    container_name: "backend"
    command: >
      bash -c "until python -c 'import socket; s = socket.socket(); s.connect((\"database\", 5432))' 2>/dev/null; do
      echo 'Esperando a la base de datos...';
      sleep 2;
      done;
      alembic upgrade head && python main.py"
    #command: bash -c "tail -f /dev/null" #Para arreglar errores sin ejecutar código
    ports:
      - 80:80
    volumes:
      - .:/app
    depends_on:
      database:
        condition: service_healthy

    env_file:
      - .env

  database:
    image: postgres:9.6.9-alpine
    container_name: "database"
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 8s
      timeout: 8s
      retries: 5

  adminer:
    image: adminer:5.4.2
    container_name: "adminer"
    depends_on:
      - database
    ports:
      - 8080:8080

volumes:
  db_data:
